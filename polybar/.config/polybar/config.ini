[colors]
font = #cdd6f4
font_dark = #181825
font_empty_workspace= #585b70
font_audio = #cba6f7
font_battery = #89b4fa
bg = #313244
bg_light = #45475a
bg_focused_workspace = #fab387
bg_spotify = #a6e3a1

[bar/main_bar]
bottom = true
monitor = eDP
background = #00
border-size = 0
border-color = #00
font-0 = JetBrainsMonoNLNerdFontMono-Medium:pixelsize=24;5
enable-struts = true
wm-restack = bspwm
height = 72px
offset-y = 14
padding = 1
modules-left = bspwm spacing spotify_previous spotify_play_pause spotify_next spotify
modules-right = date bgspacing battery pulseaudio bgspacing
enable-ipc = true

[module/bspwm]
type = internal/bspwm
pin-workspaces = true

label-empty = %name%
label-empty-padding = 2
label-empty-foreground = ${colors.font_empty_workspace}
label-empty-background = ${colors.bg}

label-occupied = %name%
label-occupied-padding = 2
label-occupied-foreground = ${colors.font}
label-occupied-background = ${colors.bg}

label-focused = %name%
label-focused-padding = 2
label-focused-foreground = ${colors.font_dark}
label-focused-background = ${colors.bg_focused_workspace}

label-urgent = %name%
label-urgent-padding = 2
label-urgent-foreground = ${colors.font}
label-urgent-background = ${colors.bg}

[module/spotify]
type = custom/script
tail = true
interval = 1
format = <label>
exec = ~/.config/polybar/spotify/spotify.sh
format-background = ${colors.bg}
format-foreground = ${colors.font}
format-padding = 2

[module/spotify_play_pause]
type = custom/script
tail = true
interval = 1
exec = ~/.config/polybar/spotify/spotify_play_pause.sh
format = %{A1:playerctl --player=spotify play-pause:}<label>%{A}
format-background = ${colors.bg_spotify}
format-foreground = ${colors.font_dark}

[module/spotify_next]
type = custom/script
tail = true
interval = 1
exec = ~/.config/polybar/spotify/spotify_next.sh
format = %{A1:playerctl --player=spotify next:}<label>%{A}%{O12}
format-background = ${colors.bg_spotify}
format-foreground = ${colors.font_dark}
format-padding = 1

[module/spotify_previous]
type = custom/script
tail = true
interval = 1
exec = ~/.config/polybar/spotify/spotify_previous.sh
format = %{O12}%{A1:playerctl --player=spotify previous:}<label>%{A}
format-background = ${colors.bg_spotify}
format-foreground = ${colors.font_dark}
format-padding = 1

[module/spacing]
type = custom/text
label = " "
format = <label>
format-background = #00

[module/bgspacing]
type = custom/text
label = " "
format = <label>
format-background = ${colors.bg_light}

[module/date]
type = internal/date
interval = 5
date = "%a %b %d"
time = %I:%M %p
label =  %time%    %date%
label-padding = 2
format-background = ${colors.bg}
format-foreground = ${colors.font}

[module/pulseaudio]
type = internal/pulseaudio
interval = 1

label-volume = 󰕾 %percentage%
format-volume-padding = 1
format-volume-background = ${colors.bg_light}
format-volume-foreground = ${colors.font_audio}

label-muted = 󰖁 %percentage%
format-muted-padding = 1
format-muted-background = ${colors.bg_light}
format-muted-foreground = ${colors.font_audio}

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT1
adapter = ACAD
poll-interval = 5

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁽
ramp-capacity-4 = 󰁾
ramp-capacity-5 = 󰁿
ramp-capacity-6 = 󰂀
ramp-capacity-7 = 󰂁
ramp-capacity-8 = 󰂂
ramp-capacity-9 = 󰁹

label-discharging = %percentage%
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-padding = 1
format-discharging-background = ${colors.bg_light}
format-discharging-foreground = ${colors.font_battery}

label-charging = 󰂄 %percentage%
format-charging-padding = 1
format-charging-background = ${colors.bg_light}
format-charging-foreground = ${colors.font_battery}
